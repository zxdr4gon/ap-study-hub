<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AP Mastery Hub</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">

  <style>
    :root {
      --base-font-family: 'Inter', sans-serif;
      --theme-color: #6366f1; /* Modern Indigo */
    }

    /* Custom Grid Styling for the Home Page */
    .ap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .ap-card {
      padding: 24px;
      border-radius: 12px;
      text-decoration: none !important;
      color: inherit !important;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 120px;
    }

    .ap-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .ap-card h3 {
      margin: 0;
      font-size: 1.2rem;
    }

    /* Dark Mode Card Adjustments */
    body.dark .ap-card {
      border-color: rgba(255,255,255,0.1);
      background: #1e1e1e;
    }
  </style>
</head>
<body>
  <div id="app">Loading AP Hub...</div>
  <script>
    window.$docsify = {
      name: 'AP Mastery Hub',
      repo: '',
      loadSidebar: true, // Enables the sidebar navigation
      subMaxLevel: 2,    // Automatically creates sub-menus from your ## Markdown headers
      
      // Dark/Light Mode Configuration
      darklightTheme: {
        siteFont: 'Inter',
        defaultTheme: 'dark',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize: '16px',
        dark: {
          accent: '#818cf8',
          toogleBackground: '#ffffff',
          background: '#0f172a',
          textColor: '#f1f5f9',
        },
        light: {
          accent: '#4f46e5',
          toogleBackground: '#0f172a',
          background: '#ffffff',
          textColor: '#1e293b',
        }
      },
      
      // LaTeX Math Renderer
      latex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$']]
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-latex@0"></script>
</body>
</html>
