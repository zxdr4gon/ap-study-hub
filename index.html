<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Study Hub</title>
  <meta name="description" content="High-end AP exam study hub with guides for Calc BC, Chemistry, CSA, English, and Physics C." />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />

  <!-- Docsify Themeable -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS VARIABLES ───────────────────────────────── */
    :root {
      --theme-color: #5b7fff;
      --sidebar-width: 280px;
      --sidebar-nav-link-color: #c0cfe0;
      --sidebar-nav-link-color--hover: #ffffff;
      --sidebar-nav-link-color--active: #ffffff;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-background: #0d1117;
      --sidebar-border-color: transparent;

      --font-family: 'DM Sans', sans-serif;
      --font-size-base: 15.5px;
      --line-height-base: 1.75;
      --heading-font-weight: 700;
      --heading-font-family: 'Syne', sans-serif;
      --code-font-size: 0.85em;
      --mono-font: 'JetBrains Mono', 'Fira Code', monospace;

      --content-max-width: 860px;
      --base-background-color: #0d1117;
      --base-color: #c9d1d9;
      --heading-color: #e6edf3;
      --link-color: #79c0ff;
      --link-color--hover: #a5d6ff;
      --blockquote-border-color: #5b7fff;
      --blockquote-background: rgba(91, 127, 255, 0.08);
      --code-background: #161b22;
      --code-theme-text: #e6edf3;
      --kbd-background: #21262d;
      --kbd-border-color: #30363d;
      --table-head-background: #161b22;
      --table-row-odd-background: #0d1117;
      --table-row-even-background: #161b22;
      --table-cell-border-color: #21262d;
      --search-input-background-color: #161b22;
      --search-input-border-color: #30363d;
      --search-input-color: #e6edf3;
      --coverpage-background: #0d1117;

      /* Light mode overrides applied via [data-theme="light"] */
    }

    [data-theme="light"] {
      --base-background-color: #f6f8fc;
      --base-color: #24292f;
      --heading-color: #0d1117;
      --sidebar-background: #ffffff;
      --sidebar-border-color: #e1e4e8;
      --sidebar-nav-link-color: #444c56;
      --sidebar-nav-link-color--hover: #0d1117;
      --sidebar-nav-link-color--active: #0d1117;
      --link-color: #2563eb;
      --link-color--hover: #1d4ed8;
      --code-background: #eff2f5;
      --code-theme-text: #1a1a2e;
      --table-head-background: #f0f3f8;
      --table-row-odd-background: #ffffff;
      --table-row-even-background: #f6f8fc;
      --table-cell-border-color: #d0d7de;
      --search-input-background-color: #ffffff;
      --search-input-border-color: #d0d7de;
      --search-input-color: #24292f;
      --blockquote-background: rgba(37, 99, 235, 0.06);
      --blockquote-border-color: #2563eb;
      --kbd-background: #f0f3f8;
      --kbd-border-color: #d0d7de;
    }

    /* ─── BASE ────────────────────────────────────────── */
    * { box-sizing: border-box; }

    body {
      font-family: var(--font-family);
      background: var(--base-background-color);
      color: var(--base-color);
      transition: background 0.3s ease, color 0.3s ease;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Syne', sans-serif;
    }

    /* ─── SIDEBAR ─────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-background) !important;
      border-right: 1px solid var(--sidebar-border-color) !important;
      padding-top: 32px;
      transition: background 0.3s ease;
    }

    .sidebar > h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      padding: 0 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      color: var(--sidebar-nav-link-color--hover);
      letter-spacing: -0.01em;
    }

    [data-theme="light"] .sidebar > h1 {
      border-bottom-color: rgba(0,0,0,0.07);
    }

    .sidebar ul li a {
      font-size: 0.875rem;
      padding: 6px 20px;
      border-radius: 6px;
      margin: 1px 8px;
      display: block;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .sidebar ul li a:hover {
      background: rgba(91, 127, 255, 0.12);
    }

    .sidebar ul li.active > a {
      background: rgba(91, 127, 255, 0.18);
      color: #79c0ff;
    }

    [data-theme="light"] .sidebar ul li.active > a {
      color: #2563eb;
      background: rgba(37, 99, 235, 0.08);
    }

    /* ─── CONTENT AREA ───────────────────────────────── */
    .content {
      padding-top: 40px;
    }

    .markdown-section {
      max-width: var(--content-max-width);
    }

    .markdown-section h1 {
      font-size: 2.2rem;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 0.5em;
    }

    .markdown-section h2 {
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      margin-top: 2.5em;
      padding-bottom: 0.4em;
      border-bottom: 1px solid var(--table-cell-border-color);
    }

    .markdown-section h3 {
      font-size: 1.15rem;
      margin-top: 2em;
    }

    .markdown-section code {
      font-family: var(--mono-font);
      font-size: 0.82em;
      padding: 0.15em 0.45em;
      border-radius: 5px;
      background: var(--code-background);
    }

    .markdown-section pre {
      border-radius: 10px;
      border: 1px solid var(--table-cell-border-color);
    }

    .markdown-section blockquote {
      border-left: 3px solid var(--blockquote-border-color);
      background: var(--blockquote-background);
      border-radius: 0 8px 8px 0;
      padding: 0.75em 1.2em;
      margin: 1.5em 0;
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
    }

    .markdown-section table th {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ─── SEARCH ──────────────────────────────────────── */
    .search input {
      border-radius: 8px !important;
      font-family: var(--font-family) !important;
      font-size: 0.85rem !important;
    }

    /* ─── THEME TOGGLE ────────────────────────────────── */
    #theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      color: #fff;
    }

    [data-theme="light"] #theme-toggle {
      background: rgba(0, 0, 0, 0.06);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
      color: #24292f;
    }

    #theme-toggle:hover {
      transform: scale(1.08);
      background: rgba(91, 127, 255, 0.25);
    }

    /* ─── HOMEPAGE: HIDE SIDEBAR ─────────────────────── */
    body.home .sidebar,
    body.home .sidebar-toggle {
      display: none !important;
    }

    body.home .content {
      margin-left: 0 !important;
      padding: 0 !important;
    }

    body.home section.cover {
      display: none !important;
    }

    /* ─── HOMEPAGE DASHBOARD ──────────────────────────── */
    .hub-wrapper {
      min-height: 100vh;
      padding: 60px 40px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--base-background-color);
      transition: background 0.3s ease;
    }

    .hub-hero {
      text-align: center;
      margin-bottom: 56px;
      max-width: 640px;
    }

    .hub-hero .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      background: rgba(91, 127, 255, 0.15);
      color: #79c0ff;
      border: 1px solid rgba(91, 127, 255, 0.3);
      margin-bottom: 22px;
    }

    [data-theme="light"] .hub-hero .badge {
      background: rgba(37, 99, 235, 0.08);
      color: #2563eb;
      border-color: rgba(37, 99, 235, 0.2);
    }

    .hub-hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: var(--heading-color);
      margin: 0 0 16px;
    }

    .hub-hero h1 span {
      background: linear-gradient(135deg, #5b7fff, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hub-hero p {
      font-size: 1rem;
      color: var(--base-color);
      opacity: 0.7;
      line-height: 1.7;
      margin: 0;
    }

    /* ─── CARD GRID ───────────────────────────────────── */
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1100px;
    }

    .hub-card {
      position: relative;
      border-radius: 16px;
      padding: 28px 26px 24px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease, border-color 0.2s ease;
      overflow: hidden;
      cursor: pointer;
    }

    [data-theme="light"] .hub-card {
      border-color: rgba(0,0,0,0.07);
      background: rgba(255,255,255,0.85);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .hub-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      background: var(--card-glow);
      border-radius: inherit;
      z-index: 0;
    }

    .hub-card:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: var(--card-accent);
      box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 0 1px var(--card-accent);
    }

    [data-theme="light"] .hub-card:hover {
      box-shadow: 0 12px 36px rgba(0,0,0,0.12), 0 0 0 1px var(--card-accent);
    }

    .hub-card:hover::before { opacity: 1; }

    .hub-card > * { position: relative; z-index: 1; }

    .card-emoji {
      font-size: 2.4rem;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--heading-color);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.8rem;
      opacity: 0.55;
      line-height: 1.5;
      flex: 1;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--card-accent);
      color: var(--card-accent);
      background: transparent;
      letter-spacing: 0.01em;
      transition: background 0.15s ease, color 0.15s ease;
      align-self: flex-start;
      margin-top: 4px;
    }

    .hub-card:hover .card-btn {
      background: var(--card-accent);
      color: #fff;
    }

    .card-stripe {
      position: absolute;
      top: 0; right: 0;
      width: 120px; height: 120px;
      border-radius: 50%;
      transform: translate(40px, -40px);
      opacity: 0.12;
      background: var(--card-accent);
      filter: blur(30px);
      pointer-events: none;
      z-index: 0;
    }

    /* Individual card accents */
    .card-calc    { --card-accent: #f59e0b; --card-glow: radial-gradient(circle at top right, rgba(245,158,11,0.08), transparent 60%); }
    .card-chem    { --card-accent: #10b981; --card-glow: radial-gradient(circle at top right, rgba(16,185,129,0.08), transparent 60%); }
    .card-csa     { --card-accent: #3b82f6; --card-glow: radial-gradient(circle at top right, rgba(59,130,246,0.08), transparent 60%); }
    .card-lang    { --card-accent: #ec4899; --card-glow: radial-gradient(circle at top right, rgba(236,72,153,0.08), transparent 60%); }
    .card-lit     { --card-accent: #a78bfa; --card-glow: radial-gradient(circle at top right, rgba(167,139,250,0.08), transparent 60%); }
    .card-em      { --card-accent: #38bdf8; --card-glow: radial-gradient(circle at top right, rgba(56,189,248,0.08), transparent 60%); }
    .card-mech    { --card-accent: #fb7185; --card-glow: radial-gradient(circle at top right, rgba(251,113,133,0.08), transparent 60%); }

    /* ─── FOOTER ──────────────────────────────────────── */
    .hub-footer {
      margin-top: 64px;
      font-size: 0.75rem;
      opacity: 0.35;
      text-align: center;
    }

    /* ─── MATHJAX ─────────────────────────────────────── */
    mjx-container {
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* ─── ANIMATIONS ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hub-hero   { animation: fadeUp 0.6s ease both; }
    .hub-grid   { animation: fadeUp 0.6s 0.15s ease both; }
    .hub-footer { animation: fadeUp 0.6s 0.3s ease both; }

    /* ─── PROGRESS BAR ────────────────────────────────── */
    #nprogress .bar {
      background: #5b7fff !important;
      height: 2px !important;
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 768px) {
      .hub-wrapper { padding: 40px 20px 60px; }
      .hub-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .hub-card { padding: 22px 18px 18px; }
      .hub-hero h1 { font-size: 2rem; }
    }

    @media (max-width: 480px) {
      .hub-grid { grid-template-columns: 1fr; }
    }

    /* ─── DOCSIFY SIDEBAR TOGGLE BTN ──────────────────── */
    .sidebar-toggle {
      background: transparent !important;
      outline: none;
    }

    .sidebar-toggle span {
      background: var(--base-color) !important;
    }
  </style>
</head>

<body data-theme="dark">

  <!-- Theme Toggle Button -->
  <button id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme">
    🌙
  </button>

  <!-- Docsify app mount point -->
  <div id="app"></div>

  <!-- ─── MATHJAX CONFIG ────────────────────────────── -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        packages: { '[+]': ['physics', 'ams'] },
        tags: 'ams',
        macros: {
          RR: '{\\mathbb{R}}',
          vec: ['\\boldsymbol{#1}', 1],
        }
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      },
      startup: {
        ready() {
          MathJax.startup.defaultReady();
        }
      }
    };
  </script>

  <!-- ─── DOCSIFY CONFIG ────────────────────────────── -->
  <script>
    window.$docsify = {
      name: '🎓 AP Study Hub',
      repo: '',
      loadSidebar: true,
      autoHeader: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      homepage: 'README.md',
      basePath: '/',

      search: {
        placeholder: 'Search guides...',
        noData: 'No results.',
        depth: 4
      },

      themeable: {
        readyTransition: true,
        responsiveTables: true
      },

      plugins: [
        // Add "home" class to body on homepage, remove on guide pages
        function(hook, vm) {
          hook.beforeEach(function(content) {
            const path = vm.route.path;
            const isHome = (path === '/' || path === '/README' || path === '');
            if (isHome) {
              document.body.classList.add('home');
            } else {
              document.body.classList.remove('home');
            }
            return content;
          });

          // Re-render MathJax after each page load
          hook.doneEach(function() {
            if (window.MathJax && MathJax.typesetPromise) {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };
  </script>

  <!-- ─── SCRIPTS ────────────────────────────────────── -->

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Docsify plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>

  <!-- Prism syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-latex.min.js"></script>

  <!-- MathJax 3 — loads AFTER docsify so typesetPromise is available -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>

  <!-- ─── THEME TOGGLE LOGIC ──────────────────────────── -->
  <script>
    (function() {
      const btn = document.getElementById('theme-toggle');
      const savedTheme = localStorage.getItem('hub-theme') || 'dark';
      applyTheme(savedTheme);

      btn.addEventListener('click', function() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('hub-theme', next);
      });

      function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
      }
    })();
  </script>

</body>
</html>
