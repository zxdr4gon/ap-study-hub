<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Study Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />

  <!-- Fonts: Syne (display) + DM Sans (body) — distinctive, not Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <!-- KaTeX for math -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />

  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius-card: 20px;
      --radius-btn: 10px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg-base: #0a0a12;
      --bg-orb1: #1a0a3a;
      --bg-orb2: #0a1a3a;
      --bg-orb3: #0a2a1a;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f0ff;
      --text-secondary: rgba(240, 240, 255, 0.55);
      --text-muted: rgba(240, 240, 255, 0.35);
      --shadow-glow: rgba(120, 80, 255, 0.15);
      --prose-bg: rgba(255,255,255,0.03);
      --sidebar-bg: rgba(10, 10, 20, 0.85);
      --sidebar-border: rgba(255,255,255,0.07);
      --sidebar-link: rgba(240,240,255,0.65);
      --sidebar-link-active: #c8b4ff;
      --code-bg: rgba(255,255,255,0.06);
      --toggle-track: rgba(255,255,255,0.12);
      --toggle-knob: #c8b4ff;
    }

    [data-theme="light"] {
      --bg-base: #f0f0fa;
      --bg-orb1: #e8d8ff;
      --bg-orb2: #d8e8ff;
      --bg-orb3: #d8ffe8;
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-border: rgba(0, 0, 0, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.80);
      --text-primary: #0a0a20;
      --text-secondary: rgba(10, 10, 32, 0.60);
      --text-muted: rgba(10, 10, 32, 0.38);
      --shadow-glow: rgba(100, 60, 220, 0.12);
      --prose-bg: rgba(255,255,255,0.6);
      --sidebar-bg: rgba(240,240,252,0.90);
      --sidebar-border: rgba(0,0,0,0.07);
      --sidebar-link: rgba(10,10,32,0.60);
      --sidebar-link-active: #5533cc;
      --code-bg: rgba(0,0,0,0.05);
      --toggle-track: rgba(0,0,0,0.10);
      --toggle-knob: #5533cc;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ============================================================
       ANIMATED BACKGROUND ORBS
    ============================================================ */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      transition: background var(--transition);
    }
    body::before {
      width: 600px; height: 600px;
      top: -150px; left: -150px;
      background: var(--bg-orb1);
      animation: orbDrift1 18s ease-in-out infinite alternate;
    }
    body::after {
      width: 500px; height: 500px;
      bottom: -100px; right: -100px;
      background: var(--bg-orb2);
      animation: orbDrift2 22s ease-in-out infinite alternate;
    }
    .orb-extra {
      position: fixed;
      width: 400px; height: 400px;
      bottom: 30%; left: 60%;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      background: var(--bg-orb3);
      animation: orbDrift3 26s ease-in-out infinite alternate;
      transition: background var(--transition);
    }

    @keyframes orbDrift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(80px, 60px) scale(1.15); }
    }
    @keyframes orbDrift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-60px, -80px) scale(1.1); }
    }
    @keyframes orbDrift3 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(50px, -70px) scale(1.2); }
    }

    /* ============================================================
       DOCSIFY LAYOUT OVERRIDES
    ============================================================ */
    #app { position: relative; z-index: 1; }

    /* Sidebar */
    .sidebar {
      font-family: var(--font-body) !important;
      background: var(--sidebar-bg) !important;
      backdrop-filter: blur(20px) saturate(1.5) !important;
      -webkit-backdrop-filter: blur(20px) saturate(1.5) !important;
      border-right: 1px solid var(--sidebar-border) !important;
      transition: background var(--transition) !important;
    }

    .sidebar-nav ul li a {
      font-family: var(--font-body) !important;
      font-size: 0.875rem !important;
      font-weight: 500 !important;
      color: var(--sidebar-link) !important;
      border-radius: 8px !important;
      padding: 6px 12px !important;
      transition: color var(--transition), background var(--transition) !important;
    }
    .sidebar-nav ul li a:hover,
    .sidebar-nav ul li a.active {
      color: var(--sidebar-link-active) !important;
      background: rgba(120, 80, 255, 0.10) !important;
    }

    .sidebar h1, .sidebar h2 {
      font-family: var(--font-display) !important;
      font-weight: 700 !important;
      color: var(--text-primary) !important;
    }

    /* Hide sidebar on homepage only */
    body.home .sidebar,
    body.home .sidebar-toggle {
      display: none !important;
    }
    body.home .content {
      margin-left: 0 !important;
    }

    /* Main content area */
    .content {
      position: relative;
      z-index: 1;
    }

    /* Markdown prose area (for guide pages) */
    .markdown-section {
      font-family: var(--font-body) !important;
      font-size: 1rem !important;
      line-height: 1.8 !important;
      color: var(--text-primary) !important;
      max-width: 820px;
      background: var(--prose-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem 3rem !important;
      margin: 2rem auto !important;
    }

    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      font-family: var(--font-display) !important;
      font-weight: 700 !important;
      color: var(--text-primary) !important;
    }
    .markdown-section h1 { font-size: 2rem !important; margin-bottom: 1rem !important; }
    .markdown-section h2 { font-size: 1.4rem !important; margin: 2rem 0 0.75rem !important; border-bottom: 1px solid var(--glass-border) !important; padding-bottom: 0.5rem !important; }
    .markdown-section h3 { font-size: 1.1rem !important; margin: 1.5rem 0 0.5rem !important; }

    .markdown-section code {
      font-size: 0.85em !important;
      background: var(--code-bg) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: 5px !important;
      padding: 2px 6px !important;
    }
    .markdown-section pre {
      background: var(--code-bg) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: 12px !important;
      padding: 1.25rem !important;
    }
    .markdown-section blockquote {
      border-left: 3px solid var(--sidebar-link-active) !important;
      background: rgba(120, 80, 255, 0.06) !important;
      border-radius: 0 12px 12px 0 !important;
      padding: 0.75rem 1.25rem !important;
      color: var(--text-secondary) !important;
    }
    .markdown-section table {
      border-collapse: collapse !important;
      width: 100% !important;
    }
    .markdown-section th, .markdown-section td {
      border: 1px solid var(--glass-border) !important;
      padding: 0.6rem 1rem !important;
    }
    .markdown-section th {
      background: rgba(120, 80, 255, 0.10) !important;
      font-family: var(--font-display) !important;
      font-weight: 600 !important;
    }

    /* Hide default cover and loading */
    .cover, .cover-main { display: none !important; }

    /* ============================================================
       DARK / LIGHT TOGGLE
    ============================================================ */
    #theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
      user-select: none;
    }
    #theme-toggle:hover { background: var(--glass-hover); }

    .toggle-track {
      width: 36px; height: 20px;
      border-radius: 10px;
      background: var(--toggle-track);
      position: relative;
      transition: background var(--transition);
    }
    .toggle-knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--toggle-knob);
      transition: transform var(--transition), background var(--transition);
    }
    [data-theme="light"] .toggle-knob { transform: translateX(16px); }

    .toggle-icon {
      font-size: 14px;
      line-height: 1;
    }
    .toggle-label {
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    /* ============================================================
       HOMEPAGE DASHBOARD (injected via README.md HTML)
    ============================================================ */
    .dashboard {
      min-height: 100vh;
      padding: 60px 32px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .dash-header {
      text-align: center;
      margin-bottom: 64px;
      animation: fadeUp 0.7s ease both;
    }
    .dash-header .eyebrow {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 5px 16px;
      margin-bottom: 20px;
    }
    .dash-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 14px;
    }
    .dash-header h1 span {
      background: linear-gradient(135deg, #c8b4ff 0%, #88d4ff 50%, #a0ffd4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-header p {
      font-size: 1.05rem;
      color: var(--text-secondary);
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* Stats row */
    .dash-stats {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 56px;
      flex-wrap: wrap;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 8px 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background var(--transition);
    }
    .stat-pill .stat-icon { font-size: 1rem; }
    .stat-pill .stat-text {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .stat-pill .stat-num {
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 22px;
    }

    /* Individual card */
    .guide-card {
      position: relative;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      padding: 28px 28px 24px;
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      overflow: hidden;
      cursor: pointer;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition),
        border-color var(--transition);
      animation: fadeUp 0.6s ease both;
      text-decoration: none;
      display: block;
    }
    .guide-card:nth-child(1) { animation-delay: 0.05s; }
    .guide-card:nth-child(2) { animation-delay: 0.10s; }
    .guide-card:nth-child(3) { animation-delay: 0.15s; }
    .guide-card:nth-child(4) { animation-delay: 0.20s; }
    .guide-card:nth-child(5) { animation-delay: 0.25s; }
    .guide-card:nth-child(6) { animation-delay: 0.30s; }
    .guide-card:nth-child(7) { animation-delay: 0.35s; }

    .guide-card:hover {
      transform: translateY(-6px) scale(1.015);
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 20px 60px -10px var(--shadow-glow), 0 0 0 1px rgba(255,255,255,0.05) inset;
    }

    /* Glow blob behind each card */
    .guide-card::before {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0;
      top: -40px; right: -40px;
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }
    .guide-card:hover::before { opacity: 0.5; transform: scale(1.2); }

    /* Per-card accent colors */
    .card-calc    { --accent: #a78bfa; --glow: rgba(167,139,250,0.3); }
    .card-chem    { --accent: #34d399; --glow: rgba(52,211,153,0.3); }
    .card-csa     { --accent: #60a5fa; --glow: rgba(96,165,250,0.3); }
    .card-englang { --accent: #f59e0b; --glow: rgba(245,158,11,0.3); }
    .card-englit  { --accent: #f472b6; --glow: rgba(244,114,182,0.3); }
    .card-physem  { --accent: #fb923c; --glow: rgba(251,146,60,0.3); }
    .card-physm   { --accent: #22d3ee; --glow: rgba(34,211,238,0.3); }

    .guide-card::before { background: var(--glow); }

    /* Accent line at top of each card */
    .card-accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: var(--radius-card) var(--radius-card) 0 0;
    }

    .card-icon {
      font-size: 2.4rem;
      margin-bottom: 14px;
      display: block;
      filter: drop-shadow(0 0 12px var(--glow));
      transition: transform var(--transition);
    }
    .guide-card:hover .card-icon { transform: scale(1.1) rotate(-5deg); }

    .card-tag {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      border-radius: 4px;
      padding: 2px 8px;
      margin-bottom: 10px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.83rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 22px;
      font-weight: 300;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .card-meta .meta-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .card-meta .meta-val {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .view-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-body);
      font-size: 0.80rem;
      font-weight: 600;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
      border-radius: var(--radius-btn);
      padding: 8px 16px;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
      flex-shrink: 0;
    }
    .view-btn:hover {
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      transform: translateX(2px);
    }
    .view-btn .arrow {
      transition: transform var(--transition);
      font-style: normal;
    }
    .view-btn:hover .arrow { transform: translateX(3px); }

    /* Footer */
    .dash-footer {
      text-align: center;
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid var(--glass-border);
      color: var(--text-muted);
      font-size: 0.80rem;
      animation: fadeUp 0.7s 0.5s ease both;
    }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 700px) {
      .dashboard { padding: 48px 20px 60px; }
      .dash-header { margin-bottom: 40px; }
      .card-grid { grid-template-columns: 1fr; gap: 16px; }
      .markdown-section { padding: 1.75rem 1.5rem !important; margin: 1rem !important; }
    }
  </style>
</head>

<body>
  <div class="orb-extra"></div>

  <!-- Theme toggle -->
  <button id="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
    <span class="toggle-icon" id="toggle-sun">☀️</span>
    <div class="toggle-track"><div class="toggle-knob"></div></div>
    <span class="toggle-icon" id="toggle-moon">🌙</span>
    <span class="toggle-label" id="toggle-label">Dark</span>
  </button>

  <!-- Docsify root -->
  <div id="app"></div>

  <!-- ============================================================
       DOCSIFY CORE
  ============================================================ -->
  <script>
    window.$docsify = {
      name: '🎓 AP Study Hub',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      noEmoji: false,
      homepage: 'README.md',
      notFoundPage: true,

      /* Hide sidebar on home, show on guides */
      alias: {},

      plugins: [
        /* Mark body.home for CSS sidebar hide */
        function (hook, vm) {
          hook.ready(function () {
            setSidebarVisibility(vm);
          });
          hook.beforeEach(function (content) {
            setSidebarVisibility(vm);
            return content;
          });

          function setSidebarVisibility(vm) {
            const path = vm.route && vm.route.path;
            if (path === '/' || path === '/README') {
              document.body.classList.add('home');
            } else {
              document.body.classList.remove('home');
            }
          }
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- docsify-latex (KaTeX) -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-latex@0.4.1/dist/docsify-latex.js"></script>

  <!-- Prism syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>

  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- ============================================================
       THEME TOGGLE LOGIC
  ============================================================ -->
  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById('theme-toggle');
      const label = document.getElementById('toggle-label');

      /* Load saved preference */
      const saved = localStorage.getItem('ap-theme') || 'dark';
      root.setAttribute('data-theme', saved);
      label.textContent = saved === 'dark' ? 'Dark' : 'Light';

      btn.addEventListener('click', () => {
        const current = root.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        label.textContent = next === 'dark' ? 'Dark' : 'Light';
        localStorage.setItem('ap-theme', next);
      });
    })();
  </script>
</body>
</html>
